<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShare P2P - Chia sẻ tức thì</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hidden { display: none; }
        pre { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <!-- Màn hình chọn phòng -->
    <div id="setup-screen" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-3xl shadow-2xl border border-gray-100">
        <div class="mb-8 text-center">
            <div class="inline-block p-4 bg-blue-100 rounded-2xl text-blue-600 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">QuickShare</h1>
            <p class="text-gray-500 mt-2">Chia sẻ văn bản qua link, không giới hạn độ dài.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Mã phòng tự đặt</label>
                <input type="text" id="room-id" placeholder="Ví dụ: bi-mat-123" 
                       class="w-full p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>
            <button onclick="joinRoom()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all flex items-center justify-center gap-2">
                Bắt đầu chia sẻ
            </button>
        </div>
    </div>

    <!-- Màn hình chính -->
    <div id="main-screen" class="max-w-2xl mx-auto hidden">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 id="display-room" class="text-2xl font-bold text-gray-900">Phòng: ...</h2>
                <p class="text-sm text-green-500 flex items-center gap-1 font-medium">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Đang kết nối trực tiếp
                </p>
            </div>
            <button onclick="location.href='?'" class="text-sm font-semibold text-gray-400 hover:text-red-500 transition-colors">Thoát</button>
        </div>

        <!-- Ô nhập liệu -->
        <div class="bg-white rounded-3xl shadow-sm border border-gray-200 overflow-hidden mb-8">
            <textarea id="text-input" placeholder="Nhập hoặc dán nội dung vào đây (không giới hạn độ dài)..." 
                      class="w-full p-6 min-h-[150px] outline-none resize-none text-gray-800 text-lg"></textarea>
            <div class="bg-gray-50 p-4 border-t flex justify-between items-center">
                <span class="text-xs text-gray-400 italic">Dữ liệu tự hủy sau khoảng 2-12h.</span>
                <button onclick="broadcast()" id="send-btn" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 shadow-md transition-all">
                    Gửi ngay
                </button>
            </div>
        </div>

        <!-- Danh sách nhận được -->
        <div class="space-y-4">
            <div class="flex items-center gap-2 text-gray-500 font-bold mb-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Nội dung nhận được
            </div>
            <div id="messages-container" class="space-y-4">
                <div class="text-center py-12 text-gray-400 border-2 border-dashed border-gray-200 rounded-3xl">
                    Chờ dữ liệu từ thiết bị khác...
                </div>
            </div>
        </div>
    </div>

    <script>
        let roomId = '';
        const NTFY_URL = 'https://ntfy.sh';

        function init() {
            const params = new URLSearchParams(window.location.search);
            const room = params.get('room');
            if (room) {
                document.getElementById('room-id').value = room;
                joinRoom();
            }
        }

        function joinRoom() {
            roomId = document.getElementById('room-id').value.trim();
            if (!roomId) return;

            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
            document.getElementById('display-room').innerText = `Phòng: ${roomId}`;
            
            const url = new URL(window.location);
            url.searchParams.set('room', roomId);
            window.history.pushState({}, '', url);

            listenForMessages();
        }

        async function broadcast() {
            const input = document.getElementById('text-input');
            const content = input.value.trim();
            const btn = document.getElementById('send-btn');
            
            if (!content) return;

            btn.disabled = true;
            btn.innerText = 'Đang gửi...';

            try {
                // ntfy.sh tự động chuyển body thành file nếu > 4096 bytes
                await fetch(`${NTFY_URL}/${roomId}`, {
                    method: 'POST',
                    body: content,
                    headers: { 
                        'Title': 'QuickShare Copy',
                        'Filename': 'content.txt' // Đặt tên file gợi ý cho server
                    }
                });
                input.value = '';
            } catch (error) {
                alert('Lỗi kết nối server!');
            } finally {
                btn.disabled = false;
                btn.innerText = 'Gửi ngay';
            }
        }

        function listenForMessages() {
            const eventSource = new EventSource(`${NTFY_URL}/${roomId}/sse`);
            
            eventSource.onmessage = async (event) => {
                const data = JSON.parse(event.data);
                if (data.event !== 'message') return;

                // Kiểm tra xem có phải là file đính kèm (văn bản dài) không
                if (data.attachment && data.attachment.url) {
                    try {
                        const response = await fetch(data.attachment.url);
                        const longText = await response.text();
                        addMessageToUI(longText, data.time);
                    } catch (e) {
                        addMessageToUI("[Lỗi: Không thể tải nội dung dài]", data.time);
                    }
                } else if (data.message) {
                    addMessageToUI(data.message, data.time);
                }
            };

            eventSource.onerror = () => {
                console.log("Reconnecting...");
            };
        }

        function addMessageToUI(text, timestamp) {
            const container = document.getElementById('messages-container');
            const timeStr = new Date(timestamp * 1000).toLocaleTimeString();
            
            if (container.querySelector('.text-center')) {
                container.innerHTML = '';
            }

            const messageDiv = document.createElement('div');
            messageDiv.className = 'bg-white p-6 rounded-2xl shadow-sm border border-gray-100 animate-in fade-in slide-in-from-bottom-2 duration-300';
            
            const msgId = 'msg-' + Math.random().toString(36).substr(2, 9);
            
            messageDiv.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <span class="text-[10px] font-extrabold text-blue-500 uppercase tracking-widest">Nhận lúc ${timeStr}</span>
                    <button onclick="copyToClipboard('${msgId}')" class="text-gray-400 hover:text-blue-600 flex items-center gap-1 transition-all">
                        <span id="copy-status-${msgId}" class="text-xs font-bold hidden text-green-500">Đã chép!</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
                <pre id="${msgId}" class="text-gray-700 whitespace-pre-wrap text-md leading-relaxed break-words">${escapeHtml(text)}</pre>
            `;
            
            container.insertBefore(messageDiv, container.firstChild);
        }

        window.copyToClipboard = (id) => {
            const text = document.getElementById(id).innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            const status = document.getElementById(`copy-status-${id}`);
            status.classList.remove('hidden');
            setTimeout(() => status.classList.add('hidden'), 2000);
        };

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        init();
    </script>
</body>
</html>
